<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrushiMitra AI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#2f8f3a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:420px;
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    .top{
      background:#2e7d32;
      padding:30px;
      text-align:center;
      color:white;
    }

    .top h1{
      margin-bottom:10px;
    }

    .btn-group{
      margin-top:20px;
      display:flex;
      justify-content:center;
      gap:10px;
    }

    .btn-group button{
      padding:10px 20px;
      border:none;
      border-radius:20px;
      cursor:pointer;
      font-weight:bold;
    }

    .signup{
      background:white;
      color:#2e7d32;
    }

    .login{
      background:#81c784;
      color:white;
    }

    .form{
      padding:25px;
    }

    .role{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .role button{
      flex:1;
      padding:10px;
      border:2px solid #2e7d32;
      background:white;
      border-radius:10px;
      cursor:pointer;
    }

    .upload{
      border:2px dashed #bdbdbd;
      padding:25px;
      text-align:center;
      border-radius:10px;
      margin-bottom:20px;
      color:gray;
    }

    .input-group{
      display:flex;
      gap:10px;
      margin-bottom:15px;
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
    }

    .submit-btn{
      width:100%;
      padding:12px;
      background:#2e7d32;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    .submit-btn:hover{
      background:#256428;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top">
      <h1>🌾 KrushiMitra AI</h1>
      <p>Kisan se Bazaar tak – Sab kuch ek setup par</p>

      <div class="btn-group">
        <button class="signup">Sign Up</button>
        <button class="login">Login</button>
      </div>
    </div>

    <div class="form">

      <div class="role">
        <button>👨‍🌾 Farmer</button>
        <button>👨‍💼 Admin</button>
      </div>

      <div class="upload">
        📷 Upload Profile Photo
      </div>

      <div class="input-group">
        <input type="text" placeholder="Full Name">
        <input type="password" placeholder="Password">
      </div>

      <div class="input-group">
        <input type="text" placeholder="Mobile Number">
        <input type="text" placeholder="Aadhaar Number">
      </div>

      <div class="input-group">
        <input type="email" placeholder="Email Address">
      </div>

      <button class="submit-btn">Create Account</button>

    </div>

  </div>

</body>
</html>
